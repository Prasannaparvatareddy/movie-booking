# ==========================================
# Server Configuration
# ==========================================
server.port=8080

# ==========================================
# H2 In-Memory Database Configuration
# ==========================================
spring.datasource.url=jdbc:h2:mem:moviebookingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ==========================================
# Data Initialization
# ==========================================
spring.sql.init.mode=always

# ==========================================
# Cache Configuration (Caffeine)
# ==========================================
# Cache type — Spring Boot will use Caffeine when it is on classpath
spring.cache.type=caffeine

# Default spec (used if no custom config per cache)
# expireAfterWrite=10m  — cache entry lives 10 minutes after write
# maximumSize=500       — max 500 entries in memory
spring.cache.caffeine.spec=expireAfterWrite=10m,maximumSize=500

# ==========================================
# HikariCP Connection Pool
# ==========================================
spring.datasource.hikari.pool-name=MovieBookingPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==========================================
# Logging
# ==========================================
logging.level.com.booking=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ==========================================
# Application Properties
# ==========================================
app.booking.afternoon-show-start=12:00
app.booking.afternoon-show-end=17:00
app.booking.afternoon-discount=0.20
app.booking.third-ticket-discount=0.50

# ==========================================
# Cache Logging — TRACE shows every cache hit/miss in console
# ==========================================
logging.level.org.springframework.cache=TRACE
